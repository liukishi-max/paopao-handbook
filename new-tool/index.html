<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>司导卡生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --orange: #FF7F3F;
    --orange-deep: #E85D1F;
    --orange-light: #FFB27F;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    background: linear-gradient(160deg,#fff3ea 0%, #ffe3d0 100%);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 16px 40px;
  }

  h1{
    font-size:18px;
    color:#7a3712;
    margin-bottom:8px;
    letter-spacing:1px;
  }
  .page-subtitle{
    font-size:13.5px;
    color:#a05a2c;
    text-align:center;
    line-height:1.6;
    margin-bottom:16px;
    max-width:340px;
  }
  .page-subtitle b{
    color:var(--orange-deep);
  }

  /* ---------- 预览卡片 ---------- */
  #exportWrap{
    width:100%;
    max-width:400px;
    background: linear-gradient(160deg, #f6f6f8 0%, #ececf1 100%);
    border-radius:24px;
    padding:28px 18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }
  #card{
    width:100%;
    max-width:400px;
    border-radius:28px;
    padding:34px 24px 28px;
    background: linear-gradient(160deg, var(--orange-light) 0%, var(--orange) 45%, var(--orange-deep) 100%);
    position:relative;
    overflow:hidden;
    color:#fff;
    box-shadow: 0 16px 40px rgba(230,90,20,0.35);
  }
  #card::before{
    content:"";
    position:absolute;
    top:-60px; right:-60px;
    width:180px; height:180px;
    background:rgba(255,255,255,0.12);
    border-radius:50%;
    z-index:0;
  }
  #card::after{
    content:"";
    position:absolute;
    bottom:-80px; left:-40px;
    width:220px; height:220px;
    background:rgba(255,255,255,0.08);
    border-radius:50%;
    z-index:0;
  }
  .logo{
    text-align:center;
    font-size:24px;
    font-weight:900;
    letter-spacing:3px;
    margin-bottom:8px;
    color:#fff;
    text-shadow:0 2px 0 rgba(180,60,10,0.35), 0 6px 14px rgba(0,0,0,0.18);
    position:relative;
    z-index:2;
  }
  .logo-icon{
    position:relative;
    z-index:2;
    display:flex;
    justify-content:center;
    margin-bottom:6px;
  }
  .logo-icon svg, .logo-icon img{
    width:120px;
    height:auto;
  }
  .card-title{
    text-align:center;
    font-size:17px;
    font-weight:700;
    margin-top:4px;
    margin-bottom:32px;
    opacity:.95;
    position:relative;
    z-index:2;
    letter-spacing:0.5px;
    line-height:1.5;
    max-width:100%;
  }
  .info-panel{
    background:rgba(255,255,255,0.16);
    border:1px solid rgba(255,255,255,0.35);
    border-radius:18px;
    padding:16px;
    backdrop-filter: blur(4px);
    position:relative;
    z-index:2;
  }
  .car-photo-banner{
    width:100%;
    height:150px;
    border-radius:14px;
    overflow:hidden;
    background:rgba(255,255,255,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    color:#777;
    text-align:center;
    margin-bottom:12px;
  }
  .car-photo-banner img{
    width:100%; height:100%; object-fit:cover;
  }
  .fields-grid{
    display:grid;
    grid-template-columns: 1fr;
    gap:8px;
  }
  .info-item{
    background:rgba(255,255,255,0.92);
    border-radius:10px;
    padding:9px 12px;
    font-size:14px;
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    color:#000000;
  }
  .info-item .k{ opacity:.7; font-weight:600; color:#000000; }
  .field-hint{
    font-size:11.5px;
    font-weight:400;
    color:rgba(0,0,0,0.38);
    margin-left:6px;
  }
  .field-hint.hide{ display:none; }

  .footer-note{
    margin-top:36px;
    background:rgba(255,255,255,0.14);
    border-radius:14px;
    padding:16px 18px;
    font-size:15px;
    font-weight:500;
    line-height:1.7;
    position:relative;
    z-index:2;
    text-align:left;
  }

  /* ---------- 操作按钮 ---------- */
  .icon-actions{
    width:100%;
    max-width:400px;
    display:flex;
    justify-content:center;
    margin-top:22px;
  }
  .download-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    width:100%;
    padding:14px;
    border-radius:14px;
    border:none;
    background: linear-gradient(135deg, var(--orange), var(--orange-deep));
    color:#fff;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(230,90,20,0.28);
  }
  .download-btn svg{ width:20px; height:20px; }
  .download-btn:active{ transform:scale(0.98); }

  .hint{
    color:#b06a3a;
    font-size:12px;
    margin-top:10px;
    text-align:center;
  }

  /* ---------- 保存图片遮罩层（页面内展示，兼容微信内置浏览器等禁止弹窗的环境） ---------- */
  .save-overlay{
    position:fixed;
    inset:0;
    background:rgba(10,10,10,0.92);
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px 20px;
    box-sizing:border-box;
    z-index:999;
  }
  .save-overlay.show{ display:flex; }
  .save-overlay .save-hint{
    color:#fff;
    font-size:14.5px;
    text-align:center;
    margin-bottom:16px;
    line-height:1.6;
  }
  .save-overlay img{
    max-width:100%;
    max-height:70vh;
    border-radius:14px;
    box-shadow:0 8px 24px rgba(0,0,0,0.5);
  }
  .save-overlay .save-close{
    margin-top:20px;
    padding:10px 28px;
    border-radius:12px;
    border:1.5px solid rgba(255,255,255,0.4);
    background:transparent;
    color:#fff;
    font-size:14px;
    cursor:pointer;
  }

  /* ---------- 直接编辑相关样式 ---------- */
  .editable{
    outline:none;
    cursor:text;
    border-radius:6px;
    padding:1px 4px;
    margin:-1px -4px;
    transition:background .15s, box-shadow .15s;
  }
  .editable:hover{
    background:rgba(255,255,255,0.14);
  }
  .editable:focus{
    background:rgba(255,255,255,0.24);
    box-shadow:0 0 0 2px rgba(255,255,255,0.55);
  }
  .card-title{ display:block; width:fit-content; max-width:100%; margin-left:auto; margin-right:auto; }
  .photo-editable{
    position:relative;
    cursor:pointer;
  }
  .photo-editable:hover .photo-hint,
  .photo-editable:focus .photo-hint{
    opacity:1;
  }
  #card.capturing .photo-hint{
    display:none;
  }
  #card.capturing .field-hint{
    display:none;
  }
  #card.capturing .editable:focus{
    background:transparent;
    box-shadow:none;
  }
  .photo-hint{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    align-items:center;
    gap:5px;
    padding:8px 16px;
    border-radius:20px;
    font-size:12.5px;
    font-weight:600;
    color:#fff;
    white-space:nowrap;
    background:rgba(0,0,0,0.48);
    opacity:0.88;
    transition:opacity .15s;
    z-index:1;
    pointer-events:none;
  }
  .info-item .editable.ph{
    opacity:.55;
    font-weight:500;
  }
  .edit-tip{
    text-align:center;
    font-size:12px;
    color:#a05a2c;
    margin-top:2px;
    margin-bottom:2px;
    max-width:340px;
  }
</style>
</head>

    { el: pvName,    hintEl: document.getElementById('pvNameHint'),  maxLen: 10, fallback: '张小飞' },
    { el: pvPhone,   hintEl: document.getElementById('pvPhoneHint'), maxLen: 20, fallback: '206xxx7579' },
    { el: pvPlate,   hintEl: document.getElementById('pvPlateHint'), maxLen: 12, fallback: 'Y123456' },
    { el: pvModel,   hintEl: document.getElementById('pvModelHint'), maxLen: 20, fallback: '塞纳7座' }
  ];

  singleLineFields.forEach(({ el, hintEl, maxLen, fallback }) => {
    // 回车不换行，直接让光标失焦，方便切到下一项
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        el.blur();
      }
    });
    // 限制字数
    el.addEventListener('input', () => {
      if (el.textContent.length > maxLen) {
        el.textContent = el.textContent.slice(0, maxLen);
        // 光标移到末尾
        const range = document.createRange();
        const sel = window.getSelection();
        range.selectNodeContents(el);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
      }
    });
    // 聚焦时：隐藏提示文案；若当前仍是示例内容，直接清空方便输入，否则全选方便一次性替换
    el.addEventListener('focus', () => {
      if (hintEl) hintEl.classList.add('hide');
      if (el.textContent === fallback) {
        el.textContent = '';
        return;
      }
      const range = document.createRange();
      range.selectNodeContents(el);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    });
    // 失焦时若为空，恢复示例内容并重新显示提示文案
    el.addEventListener('blur', () => {
      if (!el.textContent.trim()) {
        el.textContent = fallback;
        if (hintEl) hintEl.classList.remove('hide');
      }
    });
  });

  // 底部说明文字已固定为不可编辑，无需监听变化

  // 点击车辆照片区域直接更换图片
  photoBox.addEventListener('click', () => {
    inPhoto.click();
  });

  inPhoto.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      vehiclePhotoData = evt.target.result;
      photoBox.innerHTML = `<img src="${vehiclePhotoData}" alt="车辆照片"><div class="photo-hint">📷 点击更换车辆照片</div>`;
    };
    reader.readAsDataURL(file);
  });

  function generateCardImage(callback){
    html2canvas(card, {
      scale: 3,
      useCORS: true,
      backgroundColor: '#E85D1F' // 与卡片渐变同色系的深橙色，替代生硬的白色
    }).then(canvas => {
      const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
      callback(dataUrl);
    });
  }

  const saveOverlay = document.getElementById('saveOverlay');
  const saveOverlayImg = document.getElementById('saveOverlayImg');
  const saveCloseBtn = document.getElementById('saveCloseBtn');

  function showSaveOverlay(dataUrl){
    saveOverlayImg.src = dataUrl;
    saveOverlay.classList.add('show');
  }
  saveCloseBtn.addEventListener('click', () => {
    saveOverlay.classList.remove('show');
  });

  // 优先尝试系统分享面板：可一步选择"存储图像/保存到相册"，比长按更快更直接
  async function trySystemShare(dataUrl, filename){
    try {
      if (!navigator.share || !navigator.canShare) return false;
      const res = await fetch(dataUrl);
      const blob = await res.blob();
      const file = new File([blob], filename, { type: blob.type });
      if (!navigator.canShare({ files: [file] })) return false;
      await navigator.share({ files: [file], title: '司导服务卡' });
      return true;
    } catch (err) {
      // 用户取消分享，或当前环境/浏览器不支持文件分享，走后续兜底方案
      return false;
    }
  }

  document.getElementById('saveBtn').addEventListener('click', () => {
    // 清除任何未确认的编辑焦点/提示，避免出现在导出图片中
    if (document.activeElement && document.activeElement.blur) {
      document.activeElement.blur();
    }
    card.classList.add('capturing');
    generateCardImage(async (dataUrl) => {
      card.classList.remove('capturing');
      const filename = '司导服务卡.jpg';

      // 方案一：系统分享面板，可一步保存到相册（iOS/Android 主流浏览器均支持）
      const shared = await trySystemShare(dataUrl, filename);
      if (shared) return;

      // 方案二：直接触发浏览器下载（电脑浏览器、部分手机浏览器有效）
      try {
        const link = document.createElement('a');
        link.download = filename;
        link.href = dataUrl;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      } catch (err) { /* 微信内置浏览器等环境不支持直接下载 */ }

      // 方案三：页面内展示图片，长按保存（微信等内嵌浏览器的最终兜底方式）
      showSaveOverlay(dataUrl);
    });
  });
</script>

</body>
</html>
