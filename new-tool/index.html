<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>司导卡生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --orange: #FF7F3F;
    --orange-deep: #E85D1F;
    --orange-light: #FFB27F;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    background: linear-gradient(160deg,#fff3ea 0%, #ffe3d0 100%);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 16px 40px;
  }

  h1{
    font-size:18px;
    color:#7a3712;
    margin-bottom:8px;
    letter-spacing:1px;
  }
  .page-subtitle{
    font-size:13.5px;
    color:#a05a2c;
    text-align:center;
    line-height:1.6;
    margin-bottom:16px;
    max-width:340px;
  }
  .page-subtitle b{
    color:var(--orange-deep);
  }

  /* ---------- 表单区 ---------- */
  .form-card{
    width:100%;
    max-width:400px;
    background:#fff;
    border-radius:20px;
    padding:20px;
    box-shadow: 0 8px 24px rgba(255,127,63,0.18);
    margin-bottom:24px;
  }
  .field{
    margin-bottom:14px;
  }
  .field label{
    display:block;
    font-size:13px;
    color:#a05a2c;
    margin-bottom:6px;
    font-weight:600;
  }
  .field input{
    width:100%;
    padding:11px 14px;
    border-radius:12px;
    border:1.5px solid #ffd9bd;
    font-size:15px;
    outline:none;
    background:#fffaf6;
    transition:.2s;
  }
  .field input:focus{
    border-color: var(--orange);
    box-shadow:0 0 0 3px rgba(255,127,63,0.15);
  }
  .upload-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1.5px dashed var(--orange);
    background:#fff4ec;
    color:var(--orange-deep);
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  .upload-btn input{ display:none; }

  /* ---------- 预览卡片 ---------- */
  #exportWrap{
    width:100%;
    max-width:400px;
    background: linear-gradient(160deg, #f6f6f8 0%, #ececf1 100%);
    border-radius:24px;
    padding:28px 18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }
  #card{
    width:100%;
    max-width:400px;
    border-radius:28px;
    padding:34px 24px 28px;
    background: linear-gradient(160deg, var(--orange-light) 0%, var(--orange) 45%, var(--orange-deep) 100%);
    position:relative;
    overflow:hidden;
    color:#fff;
    box-shadow: 0 16px 40px rgba(230,90,20,0.35);
  }
  #card::before{
    content:"";
    position:absolute;
    top:-60px; right:-60px;
    width:180px; height:180px;
    background:rgba(255,255,255,0.12);
    border-radius:50%;
    z-index:0;
  }
  #card::after{
    content:"";
    position:absolute;
    bottom:-80px; left:-40px;
    width:220px; height:220px;
    background:rgba(255,255,255,0.08);
    border-radius:50%;
    z-index:0;
  }
  .logo{
    text-align:center;
    font-size:24px;
    font-weight:900;
    letter-spacing:3px;
    margin-bottom:8px;
    color:#fff;
    text-shadow:0 2px 0 rgba(180,60,10,0.35), 0 6px 14px rgba(0,0,0,0.18);
    position:relative;
    z-index:2;
  }
  .logo-icon{
    position:relative;
    z-index:2;
    display:flex;
    justify-content:center;
    margin-bottom:6px;
  }
  .logo-icon svg, .logo-icon img{
    width:120px;
    height:auto;
  }
  .card-title{
    text-align:center;
    font-size:16px;
    font-weight:700;
    margin-bottom:20px;
    opacity:.95;
    position:relative;
    z-index:2;
  }
  .info-panel{
    background:rgba(255,255,255,0.16);
    border:1px solid rgba(255,255,255,0.35);
    border-radius:18px;
    padding:16px;
    backdrop-filter: blur(4px);
    position:relative;
    z-index:2;
  }
  .car-photo-banner{
    width:100%;
    height:150px;
    border-radius:14px;
    overflow:hidden;
    background:rgba(255,255,255,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    color:#777;
    text-align:center;
    margin-bottom:12px;
  }
  .car-photo-banner img{
    width:100%; height:100%; object-fit:cover;
  }
  .fields-grid{
    display:grid;
    grid-template-columns: 1fr;
    gap:8px;
  }
  .info-item{
    background:rgba(255,255,255,0.92);
    border-radius:10px;
    padding:9px 12px;
    font-size:14px;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    color:#2b2b2b;
  }
  .info-item .k{ opacity:.65; font-weight:500; color:#555; }

  .footer-note{
    margin-top:16px;
    background:rgba(255,255,255,0.14);
    border-radius:14px;
    padding:14px 16px;
    font-size:13px;
    line-height:1.6;
    position:relative;
    z-index:2;
  }

  /* ---------- 操作按钮 ---------- */
  .icon-actions{
    width:100%;
    max-width:400px;
    display:flex;
    justify-content:center;
    gap:28px;
    margin-top:22px;
  }
  .icon-btn{
    width:56px;
    height:56px;
    border-radius:50%;
    border:none;
    background: linear-gradient(135deg, rgba(255,127,63,0.15), rgba(232,93,31,0.15));
    color: var(--orange-deep);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(230,90,20,0.18);
  }
  .icon-btn svg{ width:24px; height:24px; }
  .icon-btn:active{ transform:scale(0.94); }

  .hint{
    color:#b06a3a;
    font-size:12px;
    margin-top:10px;
    text-align:center;
  }
</style>
</head>

  const photoBox = document.getElementById('photoBox');

  const card = document.getElementById('exportWrap');

  let vehiclePhotoData = '';

  inName.addEventListener('input', () => {
    pvName.textContent = inName.value.trim() || '张小飞';
  });
  inPhone.addEventListener('input', () => {
    pvPhone.textContent = inPhone.value.trim() || '206-xxx-7579';
  });
  inModel.addEventListener('input', () => {
    pvModel.textContent = inModel.value.trim() || '丰田塞纳 7座';
  });
  inPlate.addEventListener('input', () => {
    pvPlate.textContent = inPlate.value.trim() || 'Y1234567';
  });

  inPhoto.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      vehiclePhotoData = evt.target.result;
      photoBox.innerHTML = `<img src="${vehiclePhotoData}" alt="车辆照片">`;
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('saveBtn').addEventListener('click', () => {
    html2canvas(card, {
      scale: 3,
      useCORS: true,
      backgroundColor: null
    }).then(canvas => {
      const link = document.createElement('a');
      link.download = '司导卡.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  });

  document.getElementById('shareBtn').addEventListener('click', () => {
    html2canvas(card, {
      scale: 3,
      useCORS: true,
      backgroundColor: null
    }).then(canvas => {
      canvas.toBlob(async (blob) => {
        const file = new File([blob], '司导卡.png', { type: 'image/png' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title: '司导卡' });
          } catch (err) { /* 用户取消分享，忽略 */ }
        } else {
          const link = document.createElement('a');
          link.download = '司导卡.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
        }
      });
    });
  });
</script>

</body>
</html>
