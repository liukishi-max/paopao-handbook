<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>司导卡生成器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --orange: #FF7F3F;
    --orange-deep: #E85D1F;
    --orange-light: #FFB27F;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    background: linear-gradient(160deg,#fff3ea 0%, #ffe3d0 100%);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 16px 40px;
  }

  h1{
    font-size:18px;
    color:#7a3712;
    margin-bottom:16px;
    letter-spacing:1px;
  }

  /* ---------- 表单区 ---------- */
  .form-card{
    width:100%;
    max-width:400px;
    background:#fff;
    border-radius:20px;
    padding:20px;
    box-shadow: 0 8px 24px rgba(255,127,63,0.18);
    margin-bottom:24px;
  }
  .field{
    margin-bottom:14px;
  }
  .field label{
    display:block;
    font-size:13px;
    color:#a05a2c;
    margin-bottom:6px;
    font-weight:600;
  }
  .field input{
    width:100%;
    padding:11px 14px;
    border-radius:12px;
    border:1.5px solid #ffd9bd;
    font-size:15px;
    outline:none;
    background:#fffaf6;
    transition:.2s;
  }
  .field input:focus{
    border-color: var(--orange);
    box-shadow:0 0 0 3px rgba(255,127,63,0.15);
  }
  .upload-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1.5px dashed var(--orange);
    background:#fff4ec;
    color:var(--orange-deep);
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  .upload-btn input{ display:none; }

  .bg-options{
    display:flex;
    gap:8px;
    margin-bottom:10px;
  }
  .bg-option{
    flex:1;
    text-align:center;
    padding:9px 4px;
    border-radius:10px;
    border:1.5px solid #ffd9bd;
    font-size:12.5px;
    font-weight:600;
    color:#a05a2c;
    background:#fffaf6;
    cursor:pointer;
    transition:.2s;
  }
  .bg-option.active{
    background: linear-gradient(135deg, var(--orange), var(--orange-deep));
    border-color:transparent;
    color:#fff;
  }
  .opacity-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
  }
  .opacity-row span{
    font-size:12px;
    color:#a05a2c;
    white-space:nowrap;
    width:70px;
  }
  .opacity-row input[type="range"]{
    flex:1;
    accent-color: var(--orange-deep);
  }

  /* ---------- 预览卡片 ---------- */
  #card{
    width:100%;
    max-width:400px;
    border-radius:28px;
    padding:34px 24px 28px;
    background: linear-gradient(160deg, var(--orange-light) 0%, var(--orange) 45%, var(--orange-deep) 100%);
    position:relative;
    overflow:hidden;
    color:#fff;
    box-shadow: 0 16px 40px rgba(230,90,20,0.35);
  }
  #card::before{
    content:"";
    position:absolute;
    top:-60px; right:-60px;
    width:180px; height:180px;
    background:rgba(255,255,255,0.12);
    border-radius:50%;
    z-index:0;
  }
  #card::after{
    content:"";
    position:absolute;
    bottom:-80px; left:-40px;
    width:220px; height:220px;
    background:rgba(255,255,255,0.08);
    border-radius:50%;
    z-index:0;
  }
  .card-bg-img{
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:0;
    pointer-events:none;
    display:none;
  }
  .card-tint{
    position:absolute;
    inset:0;
    background:linear-gradient(160deg, rgba(255,178,127,0.55) 0%, rgba(255,127,63,0.55) 45%, rgba(232,93,31,0.6) 100%);
    z-index:0;
    display:none;
  }
  .logo{
    text-align:center;
    font-size:24px;
    font-weight:900;
    letter-spacing:3px;
    margin-bottom:8px;
    color:#fff;
    text-shadow:0 2px 0 rgba(180,60,10,0.35), 0 6px 14px rgba(0,0,0,0.18);
    position:relative;
    z-index:2;
  }
  .card-title{
    text-align:center;
    font-size:16px;
    font-weight:700;
    margin-bottom:20px;
    opacity:.95;
    position:relative;
    z-index:2;
  }
  .info-panel{
    background:rgba(255,255,255,0.16);
    border:1px solid rgba(255,255,255,0.35);
    border-radius:18px;
    padding:16px;
    backdrop-filter: blur(4px);
    position:relative;
    z-index:2;
  }
  .photo-row{
    display:flex;
    align-items:stretch;
    gap:12px;
    margin-bottom:12px;
  }
  .car-photo{
    width:110px;
    height:78px;
    border-radius:12px;
    overflow:hidden;
    background:rgba(255,255,255,0.25);
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    color:rgba(255,255,255,0.85);
    text-align:center;
  }
  .car-photo img{
    width:100%; height:100%; object-fit:cover;
  }
  .photo-fields{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:8px;
    justify-content:center;
  }
  .info-item{
    background:rgba(255,255,255,0.22);
    border-radius:10px;
    padding:9px 12px;
    font-size:14px;
    font-weight:600;
    word-break:break-all;
  }
  .info-item .k{ opacity:.85; font-weight:500; }
  .full-list .info-item{ margin-bottom:8px; }
  .full-list .info-item:last-child{ margin-bottom:0; }

  .footer-note{
    margin-top:16px;
    background:rgba(255,255,255,0.14);
    border-radius:14px;
    padding:14px 16px;
    font-size:13px;
    line-height:1.6;
    position:relative;
    z-index:2;
  }

  /* ---------- 操作按钮 ---------- */
  .actions{
    width:100%;
    max-width:400px;
    display:flex;
    gap:12px;
    margin-top:22px;
  }
  .save-btn{
    flex:1;
    padding:14px;
    border:none;
    border-radius:14px;
    background: linear-gradient(135deg, var(--orange), var(--orange-deep));
    color:#fff;
    font-size:15px;
    font-weight:700;
    letter-spacing:1px;
    box-shadow:0 8px 20px rgba(230,90,20,0.35);
    cursor:pointer;
  }
  .save-btn:active{ transform:scale(0.97); }

  .hint{
    color:#b06a3a;
    font-size:12px;
    margin-top:10px;
    text-align:center;
  }
</style>
</head>
<body>

<h1>🚗 司导卡生成器</h1>

<div class="form-card">
  <div class="field">
    <label>姓名</label>
    <input id="inName" type="text" placeholder="例如：张师傅" maxlength="10">
  </div>
  <div class="field">
    <label>电话</label>
    <input id="inPhone" type="tel" placeholder="例如：138-1234-5678" maxlength="20">
  </div>
  <div class="field">
    <label>车辆型号</label>
    <input id="inModel" type="text" placeholder="例如：丰田Sienna 7座" maxlength="20">
  </div>
  <div class="field">
    <label>车牌号</label>
    <input id="inPlate" type="text" placeholder="例如：京A·88888" maxlength="12">
  </div>
  <div class="field">
    <label>车辆照片</label>
    <label class="upload-btn">
      📷 点击上传车辆照片
      <input id="inPhoto" type="file" accept="image/*">
    </label>
  </div>
  <div class="field">
    <label>卡片背景</label>
    <div class="bg-options">
      <div class="bg-option active" data-mode="gradient">默认渐变</div>
      <div class="bg-option" data-mode="vehicle">车辆照片</div>
      <div class="bg-option" data-mode="custom">自定义图片</div>
    </div>
    <label class="upload-btn" id="customBgBtn" style="display:none;">
      🖼️ 点击上传背景图片
      <input id="inBg" type="file" accept="image/*">
    </label>
    <div class="opacity-row" id="opacityRow" style="display:none;">
      <span>背景透明度</span>
      <input id="inOpacity" type="range" min="10" max="90" value="35">
    </div>
  </div>
</div>

<!-- 预览 / 生成图片区域 -->
<div id="card">
  <img class="card-bg-img" id="cardBgImg" alt="">
  <div class="card-tint" id="cardTint"></div>
  <div class="card-title" style="margin-top:6px;">您的专业司导服务前致意</div>

  <div class="info-panel">
    <div class="photo-row">
      <div class="car-photo" id="photoBox">上传车辆照片</div>
      <div class="photo-fields">
        <div class="info-item"><span class="k">名字：</span><span id="pvName">李明</span></div>
        <div class="info-item"><span class="k">电话：</span><span id="pvPhone">138XXXX5678</span></div>
      </div>
    </div>
    <div class="full-list">
      <div class="info-item"><span class="k">车牌号：</span><span id="pvPlate">京A·88888</span></div>
      <div class="info-item"><span class="k">车辆型号：</span><span id="pvModel">别克GL8</span></div>
    </div>
  </div>

  <div class="footer-note">
    感谢您选择我们的服务！我是您的司导，竭诚为您提供安全、舒适、高效的出行体验。
  </div>
</div>

<div class="actions">
  <button class="save-btn" id="saveBtn">💾 保存为图片</button>
</div>
<div class="hint">生成后长按图片可保存到相册</div>

<script>
  const inName = document.getElementById('inName');
  const inPhone = document.getElementById('inPhone');
  const inModel = document.getElementById('inModel');
  const inPlate = document.getElementById('inPlate');
  const inPhoto = document.getElementById('inPhoto');
  const inBg = document.getElementById('inBg');
  const inOpacity = document.getElementById('inOpacity');

  const pvName = document.getElementById('pvName');
  const pvPhone = document.getElementById('pvPhone');
  const pvModel = document.getElementById('pvModel');
  const pvPlate = document.getElementById('pvPlate');
  const photoBox = document.getElementById('photoBox');

  const card = document.getElementById('card');
  const cardBgImg = document.getElementById('cardBgImg');
  const cardTint = document.getElementById('cardTint');
  const bgOptions = document.querySelectorAll('.bg-option');
  const customBgBtn = document.getElementById('customBgBtn');
  const opacityRow = document.getElementById('opacityRow');

  let bgMode = 'gradient';
  let vehiclePhotoData = '';
  let customBgData = '';

  inName.addEventListener('input', () => {
    pvName.textContent = inName.value.trim() || '李明';
  });
  inPhone.addEventListener('input', () => {
    pvPhone.textContent = inPhone.value.trim() || '138XXXX5678';
  });
  inModel.addEventListener('input', () => {
    pvModel.textContent = inModel.value.trim() || '别克GL8';
  });
  inPlate.addEventListener('input', () => {
    pvPlate.textContent = inPlate.value.trim() || '京A·88888';
  });

  inPhoto.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      vehiclePhotoData = evt.target.result;
      photoBox.innerHTML = `<img src="${vehiclePhotoData}" alt="车辆照片">`;
      if (bgMode === 'vehicle') updateBackground();
    };
    reader.readAsDataURL(file);
  });

  inBg.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      customBgData = evt.target.result;
      if (bgMode === 'custom') updateBackground();
    };
    reader.readAsDataURL(file);
  });

  inOpacity.addEventListener('input', updateBackground);

  bgOptions.forEach(opt => {
    opt.addEventListener('click', () => {
      bgOptions.forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      bgMode = opt.dataset.mode;
      customBgBtn.style.display = bgMode === 'custom' ? 'flex' : 'none';
      opacityRow.style.display = bgMode === 'gradient' ? 'none' : 'flex';
      updateBackground();
    });
  });

  function updateBackground(){
    const opacity = inOpacity.value / 100;
    if (bgMode === 'gradient') {
      cardBgImg.style.display = 'none';
      cardTint.style.display = 'none';
      card.style.background = 'linear-gradient(160deg, var(--orange-light) 0%, var(--orange) 45%, var(--orange-deep) 100%)';
      return;
    }
    const src = bgMode === 'vehicle' ? vehiclePhotoData : customBgData;
    if (!src) {
      cardBgImg.style.display = 'none';
      cardTint.style.display = 'none';
      card.style.background = 'linear-gradient(160deg, var(--orange-light) 0%, var(--orange) 45%, var(--orange-deep) 100%)';
      return;
    }
    card.style.background = '#d9613a';
    cardBgImg.src = src;
    cardBgImg.style.display = 'block';
    cardBgImg.style.opacity = opacity;
    cardTint.style.display = 'block';
  }

  document.getElementById('saveBtn').addEventListener('click', () => {
    html2canvas(card, {
      scale: 3,
      useCORS: true,
      backgroundColor: null
    }).then(canvas => {
      const link = document.createElement('a');
      link.download = '司导卡.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  });
</script>

</body>
</html>
